services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  ngrok:
    image: ngrok/ngrok:latest
    profiles:
      - ngrok
    command: http app:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - app

volumes:
  mongo_data:
