services:
  app:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://host.docker.internal:27017
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"

  ngrok:
    image: ngrok/ngrok:latest
    profiles:
      - ngrok
    command: http app:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - app
